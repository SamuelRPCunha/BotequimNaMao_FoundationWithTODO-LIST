<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Botequim na Mão - Produto</title>
  <link rel="icon" href="/images/geral/header/logo_botequim_na_mao_1.png" type="image/png">
</head>
<body>
  <!-- HEADER -->
  <div class="top-bar shadow-sm" style="background-color: #fff; border-bottom: 1px solid #e6e6e6; min-height: 70px;">
    <div class="grid-container flex-container align-middle flex-wrap" style="padding: 0.5rem 0; width: 100%; justify-content: space-between;">
      <div class="top-bar-left" style="flex: 0 0 auto;">
        <ul class="menu align-middle" style="background-color: transparent;">
                    <li>
            <a href="index.html" class="flex-container align-middle" style="display: flex; padding: 0; gap: 0.5rem;">
              <img src="./images/geral/header/logo_botequim_na_mao_1.png" alt="Logo" width="50" class="rounded-circle">
              <div>
                <h1 class="h5 mb-0 text-primary fw-bold" style="margin:0; font-size: 1.25rem;">Botequim na Mão</h1>
                <p class="text-muted mb-0" style="margin:0; font-size: 0.8rem; color: #6c757d;">Seu cardápio inteligente</p>
              </div>
            </a>
          </li>
        </ul>
      </div>
      <div class="top-bar-right" style="flex: 0 0 auto; display: flex; justify-content: flex-end;">
        <ul class="menu vertical medium-horizontal align-right" style="background-color: transparent; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
          
          
          
          <li><button class="button primary" type="button" data-toggle="nav-dropdown" style="margin-bottom:0; border-radius: 50rem;">☰ Menu</button></li>
        </ul>
      </div>
    </div>
  </div>

  <div id="page-produto" style="min-height: 60vh;">
    <main class="grid-container" style="padding-top: 2rem; padding-bottom: 3rem;">
      <div style="margin-bottom: 2rem;">
        <a href="cardapio.html" class="button hollow primary tiny flex-container align-middle" style="width: max-content; gap: 0.5rem; border-radius: 50rem;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"></path><path d="M12 19L5 12L12 5"></path>
          </svg>
          <span class="fw-bold">Voltar ao Cardápio</span>
        </a>
      </div>

      <!-- Container dinâmico -->
      <div id="product-container">
        <div class="text-center" style="padding: 4rem 0;">
          <p style="color:#6c757d; font-weight:bold;">Preparando o balcão...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- FOOTER -->
  <footer class="text-center" style="background-color: #fff; padding: 2rem 0; border-top: 1px solid #e6e6e6;">
    <div class="grid-container">
      <img src="./images/geral/header/logo_botequim_na_mao_1.png" alt="Logo" width="48" class="rounded-circle" style="margin-bottom: 1rem;">
      <p style="font-size: 0.9rem; color: #6c757d;">
        &copy; 2026 Botequim na Mão.
      </p>
    </div>
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
