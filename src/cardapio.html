<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Botequim na Mão - Cardápio</title>
  <link rel="icon" href="/images/geral/header/logo_botequim_na_mao_1.png" type="image/png">
  </head>

<body>
    <!-- HEADER - TOP BAR -->
  <div class="top-bar shadow-sm" style="background-color: #fff; border-bottom: 1px solid #e6e6e6; min-height: 70px;">
    <div class="grid-container flex-container align-middle" style="padding: 0.5rem 0; width: 100%; flex-wrap: wrap; justify-content: space-between;">

      <!-- LADO ESQUERDO -->
      <div class="top-bar-left" style="flex: 0 0 auto;">
        <ul class="menu align-middle" style="background-color: transparent;">
          <li>
            <a href="index.html" class="flex-container align-middle" style="display: flex; padding: 0; gap: 0.5rem;">
              <img src="./images/geral/header/logo_botequim_na_mao_1.png" alt="Logo" width="50" class="rounded-circle">
              <div>
                <h1 class="h5 mb-0 text-primary fw-bold" style="margin:0; font-size: 1.25rem;">Botequim na Mão</h1>
                <p class="text-muted mb-0" style="margin:0; font-size: 0.8rem; color: #6c757d;">Seu cardápio inteligente</p>
              </div>
            </a>
          </li>
        </ul>
      </div>

      <!-- BUSCA CENTRALIZADA (Desktop) - Flex Center -->
      <div class="show-for-large" style="flex: 1 1 auto; display: flex; justify-content: center; padding: 0 1rem;">
        <div class="input-group search-input-group" style="justify-content: center; margin-bottom: 0; width: 100%; max-width: 500px;">
          <input class="input-group-field" type="search" id="input-busca" name="search" autocomplete="off"
            style="min-width: 400px;" placeholder="Pesquisar drink...">
          <div class="input-group-button">
            <button type="button" id="btn-toggle-filtro" class="button btn-inside-input">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- LADO DIREITO -->
      <div class="top-bar-right" style="flex: 0 0 auto; display: flex; justify-content: flex-end;">
        <ul class="menu vertical medium-horizontal align-right"
          style="background-color: transparent; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
          
          
          
          <li><button class="button primary" type="button" data-toggle="nav-dropdown"
              style="margin-bottom:0; border-radius: 50rem;">☰ Menu</button></li>
        </ul>
      </div>



    </div>
      <!-- Busca Mobile (Moved inside top-bar) -->
      <div class="hide-for-large grid-container flex-container align-center" style="padding: 0 0 0.5rem 0; width: 100%;">
        <div class="input-group search-input-group" style="margin-bottom: 0; width: 100%; justify-content: center; max-width: 500px;">
      <input class="input-group-field" type="search" id="input-busca-mobile" name="search" autocomplete="off"
        placeholder="Pesquisar drink...">
      <div class="input-group-button">
        <button type="button" id="btn-toggle-filtro-mobile" class="button btn-inside-input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
        </button>
      </div>
      </div>
      </div>
    </div>
  </div>

  <div id="page-cardapio">
    <!-- ÁREA DE FILTROS -->
    <div id="area-filtro" style="display: none; background: #fff; padding: 2rem 0; border-bottom: 1px solid #e6e6e6;">
      <div class="grid-container">
        <h3 class="h5 fw-bold">Filtrar por ingredientes</h3>
        <p class="text-muted small mb-3">Selecione os ingredientes que você deseja na sua bebida:</p>
        <div id="lista-ingredientes" class="flex-container" style="margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
        </div>
        <button id="btn-limpar-filtros" class="clear button tiny secondary" style="margin-bottom:0;">Limpar
          filtros</button>
      </div>
    </div>

    <main class="grid-container" style="padding-top: 3rem; padding-bottom: 3rem; min-height: 60vh;">
      <div id="cards-container" class="grid-x grid-margin-x grid-margin-y"></div>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
