<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Botequim na Mão - Carrinho</title>
  <link rel="icon" href="/BotequimNaMao_with_Foundation/images/geral/header/logo_botequim_na_mao_1.png" type="image/png">
  <script type="module" crossorigin src="/BotequimNaMao_with_Foundation/assets/app-BbmjCPTY.js"></script>
  <link rel="stylesheet" crossorigin href="/BotequimNaMao_with_Foundation/assets/app-LtLJ9zE2.css">
</head>
<body>
  <!-- HEADER -->
  <div class="top-bar shadow-sm" style="background-color: #fff; border-bottom: 1px solid #e6e6e6; min-height: 70px;">
    <div class="grid-container flex-container align-middle flex-wrap" style="padding: 0.5rem 0; width: 100%;">
      <div class="top-bar-left">
        <ul class="menu align-middle" style="background-color: transparent;">
          <li>
            <a href="index.html" class="flex-container align-middle" style="display: flex; padding: 0; gap: 0.5rem;">
              <img src="./images/geral/header/logo_botequim_na_mao_1.png" alt="Logo" width="50" class="rounded-circle">
              <div class="show-for-medium">
                <h1 class="h5 mb-0 text-primary fw-bold" style="margin:0; font-size: 1.25rem;">Botequim na Mão</h1>
                <p class="text-muted mb-0" style="margin:0; font-size: 0.8rem; color: #6c757d;">Seu cardápio inteligente</p>
              </div>
            </a>
          </li>
        </ul>
      </div>
      <div class="top-bar-right" style="margin-left: auto;">
        <ul class="menu align-right" style="background-color: transparent; gap: 1rem;">
          <!-- Acessibilidade -->
          <li>
            <button class="button clear secondary mb-0 btn-increase-font" title="Tamanho da Fonte" style="padding: 0.5rem; border: none; font-weight: bold; font-size: 1.1rem;" aria-label="Tamanho da Fonte">Aa</button>
          </li>
          <li>
            <button class="button clear secondary mb-0 btn-toggle-theme" title="Alternar Tema Escuro" style="padding: 0.5rem; border: none;" aria-label="Alternar Tema">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
          </li>
          <li><a href="cardapio.html" class="button hollow primary" style="margin-bottom:0;">Cardápio</a></li>
          <li><a href="login.html" class="button primary" style="margin-bottom:0;">Login</a></li>
        </ul>
      </div>
    </div>
  </div>

  <main id="page-carrinho" class="grid-container" style="padding-top: 3rem; padding-bottom: 3rem; min-height: 60vh;">
    <div class="flex-container align-justify align-middle" style="margin-bottom: 1.5rem;">
      <h1 class="h3 fw-bold mb-0 text-primary">Seu Carrinho</h1>
      <a href="cardapio.html" class="button hollow secondary rounded-pill tiny" style="margin-bottom:0;">Continuar Comprando</a>
    </div>

    <div id="cart-container" class="callout shadow-sm rounded-4 text-center" style="padding: 3rem; border:none;">
      <p style="color:#6c757d;">Carregando o carrinho...</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="text-center" style="background-color: #fff; padding: 2rem 0; border-top: 1px solid #e6e6e6;">
    <div class="grid-container">
      <img src="./images/geral/header/logo_botequim_na_mao_1.png" alt="Logo" width="48" class="rounded-circle" style="margin-bottom: 1rem;">
      <p style="font-size: 0.9rem; color: #6c757d; margin-bottom: 1rem;">
        &copy; 2026 Botequim na Mão. Todos os direitos reservados.
      </p>
    </div>
